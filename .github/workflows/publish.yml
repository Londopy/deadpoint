name: Publish to PyPI

# Publishes whenever you create a GitHub Release (which also creates a tag).
# The release tag should match the version in pyproject.toml, e.g. v0.1.0.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the environment in your PyPI pending publisher
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC) — no token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # re-runs are a no-op instead of a hard failure
